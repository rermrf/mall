syntax = "proto3";

package payment.v1;

import "google/protobuf/timestamp.proto";

option go_package = "/payment/v1;paymentv1";

// ==================== Messages ====================

message PaymentOrder {
  int64 id = 1;
  int64 tenant_id = 2;
  string payment_no = 3;
  int64 order_id = 4;
  string order_no = 5;
  string channel = 6; // wechat / alipay / mock
  int64 amount = 7; // 分
  int32 status = 8; // 1-待支付 2-支付中 3-已支付 4-已关闭 5-退款中 6-已退款
  string channel_trade_no = 9;
  int64 pay_time = 10;
  int64 expire_time = 11;
  string notify_url = 12;
  google.protobuf.Timestamp ctime = 13;
  google.protobuf.Timestamp utime = 14;
}

message RefundRecord {
  int64 id = 1;
  int64 tenant_id = 2;
  string payment_no = 3;
  string refund_no = 4;
  string channel = 5;
  int64 amount = 6;
  int32 status = 7; // 1-退款中 2-已退款 3-退款失败
  string channel_refund_no = 8;
  google.protobuf.Timestamp ctime = 9;
}

// ==================== PaymentService ====================

service PaymentService {
  // 创建支付单
  rpc CreatePayment(CreatePaymentRequest) returns (CreatePaymentResponse);
  // 查询支付单
  rpc GetPayment(GetPaymentRequest) returns (GetPaymentResponse);
  // 处理支付回调（幂等）
  rpc HandleNotify(HandleNotifyRequest) returns (HandleNotifyResponse);
  // 关闭支付单（超时未支付）
  rpc ClosePayment(ClosePaymentRequest) returns (ClosePaymentResponse);
  // 退款
  rpc Refund(RefundRequest) returns (RefundResponse);
  // 查询退款
  rpc GetRefund(GetRefundRequest) returns (GetRefundResponse);
  // 支付单列表（平台监管）
  rpc ListPayments(ListPaymentsRequest) returns (ListPaymentsResponse);
  // 对账
  rpc RunReconciliation(RunReconciliationRequest) returns (RunReconciliationResponse);
  rpc ListReconciliationBatches(ListReconciliationBatchesRequest) returns (ListReconciliationBatchesResponse);
  rpc GetReconciliationBatchDetail(GetReconciliationBatchDetailRequest) returns (GetReconciliationBatchDetailResponse);
}

// ==================== Requests & Responses ====================

message CreatePaymentRequest {
  int64 tenant_id = 1;
  int64 order_id = 2;
  string order_no = 3;
  string channel = 4;
  int64 amount = 5;
}
message CreatePaymentResponse {
  string payment_no = 1;
  string pay_url = 2; // 支付链接/二维码（实际支付渠道返回）
}

message GetPaymentRequest {
  string payment_no = 1;
}
message GetPaymentResponse {
  PaymentOrder payment = 1;
}

message HandleNotifyRequest {
  string channel = 1;
  string notify_body = 2; // 第三方回调原始报文
}
message HandleNotifyResponse {
  bool success = 1;
}

message ClosePaymentRequest {
  string payment_no = 1;
}
message ClosePaymentResponse {}

message RefundRequest {
  string payment_no = 1;
  int64 amount = 2;
  string reason = 3;
}
message RefundResponse {
  string refund_no = 1;
}

message GetRefundRequest {
  string refund_no = 1;
}
message GetRefundResponse {
  RefundRecord refund = 1;
}

// 支付单列表
message ListPaymentsRequest {
  int64 tenant_id = 1; // 0=全平台
  int32 status = 2; // 0=全部
  int32 page = 3;
  int32 page_size = 4;
}
message ListPaymentsResponse {
  repeated PaymentOrder payments = 1;
  int64 total = 2;
}

// ==================== Reconciliation ====================

message RunReconciliationRequest {
  string channel = 1;
  string bill_date = 2;
}

message RunReconciliationResponse {
  int64 batch_id = 1;
}

message ReconciliationBatch {
  int64 id = 1;
  string batch_no = 2;
  string channel = 3;
  string bill_date = 4;
  int32 status = 5;
  int32 total_channel = 6;
  int32 total_local = 7;
  int32 total_match = 8;
  int32 total_mismatch = 9;
  int64 channel_amount = 10;
  int64 local_amount = 11;
  string error_msg = 12;
  google.protobuf.Timestamp ctime = 13;
}

message ReconciliationDetail {
  int64 id = 1;
  int64 batch_id = 2;
  string payment_no = 3;
  string channel_trade_no = 4;
  int32 type = 5;
  int64 local_amount = 6;
  int64 channel_amount = 7;
  int32 local_status = 8;
  string channel_status = 9;
  bool handled = 10;
  string remark = 11;
}

message ListReconciliationBatchesRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListReconciliationBatchesResponse {
  repeated ReconciliationBatch batches = 1;
  int64 total = 2;
}

message GetReconciliationBatchDetailRequest {
  int64 batch_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message GetReconciliationBatchDetailResponse {
  ReconciliationBatch batch = 1;
  repeated ReconciliationDetail details = 2;
  int64 total = 3;
}
