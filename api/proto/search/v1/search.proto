syntax = "proto3";

package search.v1;

option go_package = "/search/v1;searchv1";

// ==================== Messages ====================

message SearchProduct {
  int64 id = 1;
  int64 tenant_id = 2;
  string name = 3;
  string subtitle = 4;
  int64 category_id = 5;
  string category_name = 6;
  int64 brand_id = 7;
  string brand_name = 8;
  int64 price = 9; // 分（最低 SKU 价格）
  int64 sales = 10;
  string main_image = 11;
  int64 shop_id = 12;
  string shop_name = 13;
}

message HotWord {
  string word = 1;
  int64 count = 2;
}

message SearchHistory {
  string keyword = 1;
  int64 ctime = 2;
}

// 同步到 ES 的商品文档
message ProductDocument {
  int64 id = 1;
  int64 tenant_id = 2;
  string name = 3;
  string subtitle = 4;
  int64 category_id = 5;
  string category_name = 6;
  int64 brand_id = 7;
  string brand_name = 8;
  int64 price = 9;
  int64 sales = 10;
  string main_image = 11;
  int32 status = 12;
  int64 shop_id = 13;
  string shop_name = 14;
}

// ==================== SearchService ====================

service SearchService {
  // 搜索商品
  rpc SearchProducts(SearchProductsRequest) returns (SearchProductsResponse);
  // 搜索建议（输入联想）
  rpc GetSuggestions(GetSuggestionsRequest) returns (GetSuggestionsResponse);
  // 热搜词
  rpc GetHotWords(GetHotWordsRequest) returns (GetHotWordsResponse);
  // 用户搜索历史
  rpc GetSearchHistory(GetSearchHistoryRequest) returns (GetSearchHistoryResponse);
  rpc ClearSearchHistory(ClearSearchHistoryRequest) returns (ClearSearchHistoryResponse);

  // 同步接口（Canal Consumer 或 product-svc 事件触发）
  rpc SyncProduct(SyncProductRequest) returns (SyncProductResponse);
  rpc DeleteProduct(DeleteProductRequest) returns (DeleteProductResponse);
}

// ==================== Requests & Responses ====================

message SearchProductsRequest {
  string keyword = 1;
  int64 category_id = 2; // 0=不限
  int64 brand_id = 3; // 0=不限
  int64 price_min = 4; // 分，0=不限
  int64 price_max = 5; // 分，0=不限
  int64 tenant_id = 6; // 0=全平台
  string sort_by = 7; // price_asc / price_desc / sales_desc / default
  int32 page = 8;
  int32 page_size = 9;
}
message SearchProductsResponse {
  repeated SearchProduct products = 1;
  int64 total = 2;
}

message GetSuggestionsRequest {
  string prefix = 1;
  int32 limit = 2;
}
message GetSuggestionsResponse {
  repeated string suggestions = 1;
}

message GetHotWordsRequest {
  int32 limit = 1;
}
message GetHotWordsResponse {
  repeated HotWord words = 1;
}

message GetSearchHistoryRequest {
  int64 user_id = 1;
  int32 limit = 2;
}
message GetSearchHistoryResponse {
  repeated SearchHistory histories = 1;
}

message ClearSearchHistoryRequest {
  int64 user_id = 1;
}
message ClearSearchHistoryResponse {}

// 同步
message SyncProductRequest {
  ProductDocument product = 1;
}
message SyncProductResponse {}

message DeleteProductRequest {
  int64 id = 1;
}
message DeleteProductResponse {}
