syntax = "proto3";

package cart.v1;

option go_package = "/cart/v1;cartv1";

// ==================== Messages ====================

message CartItem {
  int64 sku_id = 1;
  int64 product_id = 2;
  int64 tenant_id = 3;
  int32 quantity = 4;
  bool selected = 5;
  // 以下字段由 BFF 聚合时填充（gRPC 调用 product-svc 获取最新信息）
  string product_name = 6;
  string product_image = 7;
  string sku_spec = 8;
  int64 price = 9; // 分（最新价格）
  int32 stock = 10; // 当前库存
}

// ==================== CartService ====================

service CartService {
  // 添加商品到购物车
  rpc AddItem(AddItemRequest) returns (AddItemResponse);
  // 更新购物车商品数量/选中状态
  rpc UpdateItem(UpdateItemRequest) returns (UpdateItemResponse);
  // 移除购物车商品
  rpc RemoveItem(RemoveItemRequest) returns (RemoveItemResponse);
  // 获取购物车（全部商品）
  rpc GetCart(GetCartRequest) returns (GetCartResponse);
  // 清空购物车
  rpc ClearCart(ClearCartRequest) returns (ClearCartResponse);
  // 批量删除已下单的商品
  rpc BatchRemoveItems(BatchRemoveItemsRequest) returns (BatchRemoveItemsResponse);
}

// ==================== Requests & Responses ====================

message AddItemRequest {
  int64 user_id = 1;
  int64 sku_id = 2;
  int64 product_id = 3;
  int64 tenant_id = 4;
  int32 quantity = 5;
}
message AddItemResponse {}

message UpdateItemRequest {
  int64 user_id = 1;
  int64 sku_id = 2;
  int32 quantity = 3; // 0=不更新数量
  bool selected = 4;
  bool update_selected = 5; // 是否更新 selected 字段
}
message UpdateItemResponse {}

message RemoveItemRequest {
  int64 user_id = 1;
  int64 sku_id = 2;
}
message RemoveItemResponse {}

message GetCartRequest {
  int64 user_id = 1;
}
message GetCartResponse {
  repeated CartItem items = 1;
}

message ClearCartRequest {
  int64 user_id = 1;
}
message ClearCartResponse {}

message BatchRemoveItemsRequest {
  int64 user_id = 1;
  repeated int64 sku_ids = 2;
}
message BatchRemoveItemsResponse {}
